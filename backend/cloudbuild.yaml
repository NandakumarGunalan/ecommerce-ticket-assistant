steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/ml-repo/ticket-backend-api:latest
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/ml-repo/ticket-backend-api:$SHORT_SHA
      - .
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/ml-repo/ticket-backend-api:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/ml-repo/ticket-backend-api:$SHORT_SHA
options:
  machineType: E2_HIGHCPU_8
timeout: 900s
