name: Secret scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITLEAKS_LICENSE only needed for orgs; personal/edu repos work without it.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
