name: Frontend contract test

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/api/**'
      - 'backend/schemas.py'
      - '.github/workflows/frontend-contract-test.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/api/**'

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run contract checks
        run: python frontend/tests/test_contract.py
