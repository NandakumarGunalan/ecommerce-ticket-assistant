name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff==0.7.4
      - name: Ruff check
        run: ruff check backend/ inference/ training/ --exclude '**/tests/**' --select E,F,W,I --ignore E501
      - name: Ruff format check
        run: ruff format --check backend/ inference/ training/ || echo "::warning::Ruff format suggestions present (non-blocking)"
